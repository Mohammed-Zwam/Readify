<div class="d-flex min-vh-100">
  <app-hero-section
    class="col-lg-6"
    [imgSrc]="'/assets/bg1.jpg'"
    [title]="'Create a strong new password.'"
    [description]="
      'Choose a strong password with a mix of letters, numbers, and symbols to keep your account secure.'
    "
  >
    <div class="row g-3">
      <div class="col-6">
        <div class="p-3 border rounded text-center bg-glass">
          <h4><i class="bi bi-shield-lock"></i></h4>
          <small class="text-uppercase text-white">Bank-Grade Security</small>
        </div>
      </div>
      <div class="col-6">
        <div class="p-3 border rounded text-center bg-glass">
          <h4><i class="bi bi-check2-circle"></i></h4>
          <small class="text-uppercase text-white">Instant Access</small>
        </div>
      </div>
    </div>
  </app-hero-section>

  <!-- Right Side -->
  <main
    class="col-12 col-lg-6 d-flex align-items-center justify-content-center p-4 p-lg-5 bg-white overflow-auto"
  >
    <div style="max-width: 400px; width: 100%">
      <div class="mb-4">
        <h2 class="fw-bold">Create New Password</h2>
        <p class="text-muted">Please enter a strong password to secure your account.</p>
      </div>


      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <!-- Password -->
        <div class="mb-3">
          <label class="form-label small text-uppercase text-muted fw-bold">New Password</label>

          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-control"
              [class.is-invalid]="isFieldInvalid('password')"
              formControlName="password"
            />
            <button
              class="btn btn-outline-secondary"
              type="button"
              (click)="togglePasswordVisibility()"
            >
              <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
          <div class="invalid-feedback d-block" *ngFor="let error of getPasswordErrors()">
            <small><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</small>
          </div>

          <!-- Strength -->
          <div class="mt-2" *ngIf="resetForm.get('password')?.value">
            <div class="d-flex justify-content-between mb-1">
              <small class="text-muted">Password Strength</small>
              <small [style.color]="getPasswordStrengthColor()">
                {{ getPasswordStrengthLabel() }}
              </small>
            </div>

            <div class="progress" style="height: 6px">
              <div
                class="progress-bar"
                role="progressbar"
                [style.width.%]="passwordStrength * 20"
                [style.backgroundColor]="getPasswordStrengthColor()"
              ></div>
            </div>
          </div>
        </div>

        <!-- Confirm -->
        <div class="mb-3">
          <label class="form-label small text-uppercase text-muted fw-bold">Confirm Password</label>

          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              class="form-control"
              [class.is-invalid]="isFieldInvalid('confirmPassword') || hasPasswordMismatch()"
              formControlName="confirmPassword"
            />
            <button
              class="btn btn-outline-secondary"
              type="button"
              (click)="toggleConfirmPasswordVisibility()"
            >
              <i [class]="showConfirmPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>

          <div class="invalid-feedback d-block" *ngFor="let error of getConfirmPasswordErrors()">
            <small><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</small>
          </div>
        </div>

        <!-- Submit -->
        <button
          class="btn btn-primary w-100 d-flex justify-content-center align-items-center gap-2 mt-3"
          [disabled]="loading"
        >
          Reset Password
          <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
        </button>
      </form>

      <div class="text-center mt-4 pt-4 border-top">
        <p class="text-muted">
          Remember your password?
          <a routerLink="/auth/login" class="fw-bold text-primary">Sign In</a>
        </p>
      </div>
    </div>
  </main>
</div>
