<div class="d-flex min-vh-100">
  <app-hero-section
    class="col-lg-6"
    [imgSrc]="'/assets/bg3.jpg'"
    [title]="'Need help recovering your account ?'"
    [description]="'No worries! We will send you a link to reset your password via email.'"
  >
    <div class="row g-3">
      <div class="col-6">
        <div class="p-3 border rounded text-center bg-glass">
          <h4><i class="bi bi-shield-check"></i></h4>
          <small class="text-uppercase text-white">Secure Process</small>
        </div>
      </div>
      <div class="col-6">
        <div class="p-3 border rounded text-center bg-glass">
          <h4><i class="bi bi-lightning-fill"></i></h4>
          <small class="text-uppercase text-white">Instant Recovery</small>
        </div>
      </div>
    </div>
  </app-hero-section>

  <!-- Right Side -->
  <main
    class="col-12 col-lg-6 d-flex align-items-center justify-content-center p-4 p-lg-5 bg-white overflow-auto"
  >
    <div style="max-width: 400px; width: 100%">
      <div class="mb-4">
        <h2 class="fw-bold">Reset Password</h2>
        <p class="text-muted">Enter your email to reset your password.</p>
      </div>


      <!-- Success -->
      <div *ngIf="submitted" class="alert alert-success d-flex align-items-start gap-3">
        <i class="bi bi-check-circle-fill fs-4"></i>
        <div>
          <strong>Check your email</strong>
          <div class="small">We've sent a reset link. Please check your inbox.</div>
        </div>
      </div>

      <!-- Form -->
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" *ngIf="!submitted">
        <div class="mb-3">
          <label class="form-label small text-uppercase text-muted fw-bold">Email</label>

          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input 
              type="email" 
              class="form-control" 
              [class.is-invalid]="isFieldInvalid('email')"
              formControlName="email" 
            />
          </div>
          <div class="invalid-feedback d-block" *ngFor="let error of getEmailErrors()">
            <small><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</small>
          </div>
        </div>

        <button
          class="btn btn-primary w-100 d-flex justify-content-center align-items-center gap-2 mt-3"
          [disabled]="loading"
        >
          Send Reset Link
          <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
        </button>
      </form>

      <div class="text-center mt-4 pt-4 border-top">
        <p class="text-muted">
          Remembered your password?
          <a routerLink="/auth/login" class="fw-bold text-primary">Sign In</a>
        </p>
      </div>
    </div>
  </main>
</div>
